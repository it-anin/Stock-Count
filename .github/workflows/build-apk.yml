name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'           # สร้าง Release เมื่อ push tag เช่น v1.1, v1.2
  workflow_dispatch:   # กด Run ด้วยมือจาก GitHub UI ได้เลย

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version=8.6

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      # เปลี่ยนชื่อไฟล์เป็น StockCountPDA.apk (ตรงกับ downloadUrl ใน version.json)
      - name: Rename APK
        run: mv android-app/app/build/outputs/apk/debug/app-debug.apk android-app/app/build/outputs/apk/debug/StockCountPDA.apk

      # อัปโหลดเป็น Artifact (ทุก build)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockCountPDA-${{ github.run_number }}
          path: android-app/app/build/outputs/apk/debug/StockCountPDA.apk
          retention-days: 60

      # สร้าง GitHub Release พร้อมแนบ APK เมื่อ push tag v*
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/debug/StockCountPDA.apk
          name: "Stock Count PDA ${{ github.ref_name }}"
          body: |
            ## Stock Count PDA ${{ github.ref_name }}

            ดาวน์โหลด `StockCountPDA.apk` แล้วติดตั้งบน PDA

            ### วิธีอัปเดต
            1. เปิดแอป → จะมี popup แจ้งเตือนอัตโนมัติ → กด อัปเดต
            2. หรือโอนไฟล์ไปที่ PDA ผ่าน USB แล้วติดตั้งเอง
