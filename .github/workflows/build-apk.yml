name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # กด Run ด้วยมือจาก GitHub UI ได้เลย

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ติดตั้ง Gradle 8.6 + cache — ไม่ต้องมี gradlew ในโปรเจกต์
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # สร้าง gradlew wrapper ในเครื่อง CI แทนที่จะ commit JAR ลง repo
      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version=8.6

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      # อัพโหลด APK เป็น Artifact (เก็บ 60 วัน, โหลดได้จาก Actions tab)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockCountPDA-debug-${{ github.run_number }}
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60

      # สร้าง GitHub Release พร้อมแนบ APK เมื่อ push tag เช่น v1.0, v1.1
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
          name: "Stock Count PDA ${{ github.ref_name }}"
          body: |
            ## APK สำหรับ iTCAN IT68

            ดาวน์โหลด `app-debug.apk` แล้วติดตั้งบน PDA

            ### วิธีติดตั้ง
            1. โอนไฟล์ไปที่ PDA ผ่าน USB หรือ Wi-Fi
            2. เปิด File Manager แล้ว tap ไฟล์ .apk
            3. กด ติดตั้ง
